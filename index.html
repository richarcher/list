<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#aa3bff" />
    <title>List & Lys</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        var root = document.getElementById('app')
        var timeoutMs = 5000
        var timer = setTimeout(function showFallback() {
          if (!root || root.childElementCount > 0) return
          var bar = document.createElement('div')
          bar.id = 'app-mount-fallback'
          bar.setAttribute('role', 'alert')
          bar.style.cssText =
            'position:fixed;bottom:0;left:0;right:0;padding:1rem;background:#1f2028;color:#e5e7eb;font-family:system-ui,sans-serif;font-size:14px;z-index:99999;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:0.75rem;border-top:1px solid #3b3f4a;'
          bar.innerHTML =
            '<span>The app did not start. Please reload.</span><button type="button" style="cursor:pointer;padding:0.4rem 0.75rem;border-radius:0.375rem;border:1px solid #aa3bff;background:#aa3bff;color:#fff;font:inherit;">Reload app</button>'
          var btn = bar.querySelector('button')
          if (btn) btn.onclick = function () { location.reload() }
          document.body.appendChild(bar)
        }, timeoutMs)
        if (root) {
          var obs = new MutationObserver(function () {
            if (root.childElementCount > 0) {
              clearTimeout(timer)
              obs.disconnect()
            }
          })
          obs.observe(root, { childList: true, subtree: true })
        }
      })()
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
